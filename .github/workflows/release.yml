name: Release

# After a successful CI run on master, publishes installers to GitHub Releases.
# Version is 1.0.<this workflow's run_number> so each release is unique without
# committing version bumps to the repo. Parallel matrix jobs upload platform assets
# to the same release.
#
# For signed / notarized macOS builds in CI, configure signing cert secrets plus one notarization
# strategy (Apple ID, App Store Connect API key, or keychain profile). This workflow already
# forwards the common env vars used by Electron Forge / @electron-notarize.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master'

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_SIGN: ${{ secrets.APPLE_SIGN }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.CSC_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Apple API key file
        if: runner.os == 'macOS' && env.APPLE_API_KEY != ''
        shell: bash
        run: |
          if [[ -f "$APPLE_API_KEY" ]]; then
            exit 0
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID:-notary}.p8"
          printf '%s' "$APPLE_API_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Set release version in package.json
        run: |
          node -e "const fs=require('fs'); const v='1.0.'+process.env.GITHUB_RUN_NUMBER; const p=require('./package.json'); p.version=v; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n'); console.log('Publishing version',v);"

      - name: Publish to GitHub Releases
        run: npm run publish
