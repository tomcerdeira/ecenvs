name: Release

# Publishes platform installers to GitHub Releases for the pushed tag.
# Ensure package.json "version" matches the tag (e.g. tag v1.2.3 → version 1.2.3).
# Parallel jobs each upload assets for the same release.
#
# For signed / notarized macOS builds in CI, add repository secrets and wire env here, e.g.:
#   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID, CSC_LINK, CSC_KEY_PASSWORD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Releases
        run: npm run publish
