name: Build

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  make:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ecenvs-linux
          - os: macos-latest
            artifact: ecenvs-macos
          - os: windows-latest
            artifact: ecenvs-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make installers
        run: npm run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/make/
          if-no-files-found: error
